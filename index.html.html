<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0e">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUGFzc2FnZSIsInNob3J0X25hbWUiOiJQYXNzYWdlIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjBmMGUiLCJ0aGVtZV9jb2xvciI6IiMwZjBmMGUifQ==">
<title>Passage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--fd:'Cormorant Garamond',Georgia,serif;--fb:'Source Serif 4',Georgia,serif;--bg:#0f0f0e;--sf:#1a1a18;--sa:#141413;--br:#2a2a27;--tx:#e8e4dc;--tm:#8a8578;--ac:#c4956a}
html,body{font-family:var(--fb);color:var(--tx);background:var(--bg);min-height:100vh;min-height:100dvh;-webkit-text-size-adjust:100%;overscroll-behavior:none}
::selection{background:var(--ac);color:var(--bg)}
input,textarea,button{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pd{width:7px;height:7px;background:var(--ac);border-radius:50%;display:inline-block;animation:pulse 1.2s ease-in-out infinite}
.fade{animation:fadeIn .25s ease}

header{padding:max(env(safe-area-inset-top,16px),16px) 16px 12px;border-bottom:1px solid var(--br);position:sticky;top:0;background:var(--bg);z-index:10}
header h1{font-family:var(--fd);font-size:24px;font-weight:400}
header h1 span{color:var(--ac)}
header .sub{font-family:var(--fd);font-size:11px;color:var(--tm);font-style:italic;margin-top:1px}
nav{display:flex;gap:3px;margin-top:12px}
nav button{padding:8px 13px;border-radius:5px;border:1px solid transparent;font-size:13px;font-family:var(--fd);letter-spacing:.04em;cursor:pointer;background:transparent;color:var(--tm);transition:all .12s;min-height:40px}
nav button.on{border-color:var(--ac);background:rgba(196,149,106,.1);color:var(--ac)}
nav .ic{font-size:9px;margin-right:3px}

main{max-width:720px;margin:0 auto;padding:20px 14px max(env(safe-area-inset-bottom,20px),70px)}

.card{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:16px;margin-bottom:10px;transition:border-color .12s}
.card.sel{border-color:var(--ac)}
.badge{font-size:9px;padding:2px 7px;border-radius:4px;color:#fff;letter-spacing:.06em;font-family:var(--fd);text-transform:uppercase;display:inline-block;white-space:nowrap}
.b-now{background:#c44}.b-soon{background:#c4956a}.b-plan{background:#7a8a6a}.b-horizon{background:#6a7a8a}.b-comm{background:var(--ac)}.b-emb{background:var(--tm)}

input[type=text],input[type=password],textarea{width:100%;padding:12px 14px;border:1px solid var(--br);border-radius:7px;font-size:14px;background:var(--sf);color:var(--tx);outline:none;transition:border-color .12s}
input:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;line-height:1.6}

.btn{padding:10px 18px;border-radius:7px;font-family:var(--fd);font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;transition:all .12s;min-height:44px}
.btn:active{transform:scale(.97)}
.btn.p{background:var(--ac);color:#fff}.btn.s{background:var(--sa);color:var(--tx);border:1px solid var(--br)}.btn.g{background:transparent;color:var(--tm);border:1px solid var(--br)}
.btn:disabled{opacity:.5;cursor:default}

.aibox{background:var(--sa);border:1px solid var(--br);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;padding:16px 18px;margin-top:14px;font-size:13px;line-height:1.65}
.todo{font-size:13px;padding:4px 0 4px 18px;position:relative}.todo::before{content:'→';position:absolute;left:0;color:var(--ac)}
.shd{font-family:var(--fd);font-size:12px;color:var(--ac);letter-spacing:.08em;text-transform:uppercase;margin:24px 0 10px}
.thd{font-family:var(--fd);font-size:16px;font-weight:600}
.tm{font-size:12px;color:var(--tm);margin-top:2px}

.md h2{font-family:var(--fd);font-size:16px;margin:16px 0 6px}.md h3{font-family:var(--fd);font-size:15px;margin:14px 0 5px}
.md h4{font-family:var(--fd);font-size:14px;margin:12px 0 4px}.md p{margin:3px 0;line-height:1.6}
.md .li{padding-left:14px;position:relative;margin:2px 0}.md .li::before{content:'·';position:absolute;left:0;color:var(--ac)}

.overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay-box{max-width:400px;width:100%;text-align:center}
.overlay-box h2{font-family:var(--fd);font-size:28px;margin-bottom:6px}
.overlay-box p{color:var(--tm);font-size:13px;margin-bottom:20px;line-height:1.5}
.overlay-box .err{color:#c44;font-size:12px;margin-top:8px}

@media(max-width:500px){
  header{padding:max(env(safe-area-inset-top,12px),12px) 12px 10px}
  header h1{font-size:22px}
  main{padding:16px 12px 80px}
  nav button{padding:8px 10px;font-size:12px}
  .card{padding:14px}
}
</style>
</head>
<body>

<div id="setup" class="overlay" style="display:none">
  <div class="overlay-box">
    <h2><span style="color:var(--ac)">✦</span> Passage</h2>
    <p>To use AI research, enter your Anthropic API key.<br>It's stored only in your browser, never sent anywhere else.<br><br>Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></p>
    <input type="password" id="key-input" placeholder="sk-ant-api03-..." style="margin-bottom:10px">
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn p" onclick="saveKey()">Save & Start</button>
      <button class="btn s" onclick="skipKey()">Skip — no AI</button>
    </div>
    <div id="key-err" class="err" style="display:none"></div>
  </div>
</div>

<div id="main-app" style="display:none">
  <header>
    <h1><span>✦</span> Passage</h1>
    <div class="sub" id="date-line"></div>
    <nav id="nav"></nav>
  </header>
  <main id="app"></main>
</div>

<script>
// ─── API KEY ───
let API_KEY = localStorage.getItem('passage_api_key') || '';

function saveKey() {
  const k = document.getElementById('key-input').value.trim();
  if (!k) { document.getElementById('key-err').style.display='block'; document.getElementById('key-err').textContent='Please enter a key or skip.'; return; }
  API_KEY = k;
  localStorage.setItem('passage_api_key', k);
  boot();
}
function skipKey() { API_KEY = ''; boot(); }
function boot() {
  document.getElementById('setup').style.display='none';
  document.getElementById('main-app').style.display='block';
  render();
}
function showSetup() {
  document.getElementById('setup').style.display='flex';
  document.getElementById('main-app').style.display='none';
}

// ─── INIT ───
if (API_KEY) boot();
else showSetup();

// ─── DATA ───
const NOW = new Date();
const daysUntil = d => Math.ceil((new Date(d) - NOW) / 864e5);
const urg = d => d <= 7 ? 'now' : d <= 21 ? 'soon' : d <= 60 ? 'plan' : 'horizon';
const fmtDate = () => NOW.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

const TRIPS = [
  {id:1,dest:"Belfast / Ulster Coast",dates:"Apr 15–19",start:"2026-04-15",pub:"The Spectator",brief:"Foodie tour",flights:"U2 627 LTN→BFS Apr 15 (13:15). U2 21 BFS→LTN Apr 19 (16:25).",hotel:"",todo:["Book accommodation","Research Ulster food scene — Michelin places, oyster farms, seaweed foragers"]},
  {id:2,dest:"Kigali, Rwanda",dates:"Apr 26 – May 2",start:"2026-04-26",pub:"The Spectator",brief:"",flights:"",hotel:"",todo:["Check visa — Rwanda e-visa likely needed (irembo.gov.rw)","Yellow fever certificate probably required","Book flights","Book accommodation"]},
  {id:3,dest:"Funchal, Madeira",dates:"May 16–21",start:"2026-05-16",pub:"The Telegraph",brief:"",flights:"",hotel:"",todo:["Follow up with Rebecca at Original Travel on itinerary","Book flights — Gatwick/easyJet likely"]},
  {id:4,dest:"Millau / Aveyron",dates:"Jun 17–21",start:"2026-06-17",pub:"The Spectator",brief:"",flights:"",hotel:"",todo:["Plan transport — Eurostar+TGV? Or fly Toulouse/Montpellier and drive?"]},
  {id:5,dest:"Hokkaido, Japan",dates:"Jun 27 – Jul 2",start:"2026-06-27",pub:"The Spectator",brief:"",flights:"",hotel:"",todo:["Clarify routing — TripIt says Tokyo but trip is Hokkaido","Book flights","Research Hokkaido summer — lavender, seafood, onsen"]},
  {id:6,dest:"Saudi Arabia",dates:"Oct 30 – Nov 7",start:"2026-10-30",pub:"The Spectator",brief:"",flights:"",hotel:"",todo:["Saudi e-visa — check requirements","Far out, no rush"]},
  {id:7,dest:"Iceland",dates:"Nov 11–18",start:"2026-11-11",pub:"The Spectator",brief:"Unknown Iceland",flights:"",hotel:"",todo:["Follow up on Visit Iceland call details","Far out, no rush"]},
];

const COMMISSIONED = [
  {id:20,dest:"Vipava Valley, Slovenia",pub:"Daily Mail",angle:"Provence Without the Billionaires",brief:"800w, £400. Ben Parker wants spring. You said you'd file ASAP.",contact:"Ben Parker — ben.parker@dailymail.co.uk",todo:["Book trip — May/Jun or Sept ideal (24–28°C)","Find flights + accommodation","File as soon as you get there"]},
];

const EMBRYONIC = [
  {id:30,dest:"Ischia",pub:"The Spectator",status:"AWAITING EDITOR",note:"Need yay or nay from Spec editor. Possible May."},
  {id:31,dest:"Azerbaijan",pub:"The Spectator",status:"NEEDS CALL",note:"Need to arrange call to discuss."},
  {id:32,dest:"Abruzzo (wolves / trabocchi)",pub:"The Spectator",status:"NEED TOUR OP",note:"Also pitched 'Italy's Forgotten Shore' to Mail. Need tour operator for wolf angle."},
  {id:33,dest:"Greenland",pub:"The Spectator",status:"NEED TOUR OP",note:"Need specialist tour operator."},
  {id:34,dest:"Soria, Spain",pub:"The Spectator",status:"NEED TOUR OP",note:"Need operator/fixer."},
];

// ─── STORAGE ───
const ls = {
  get(k){try{return JSON.parse(localStorage.getItem('p_'+k))}catch{return null}},
  set(k,v){try{localStorage.setItem('p_'+k,JSON.stringify(v))}catch{}}
};

// ─── AI ───
async function askAI(sys, msg) {
  if (!API_KEY) return '⚠ No API key set. Tap the ✦ header to configure.';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:sys,messages:[{role:'user',content:msg}]})
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); return `API error ${r.status}: ${e.error?.message||'Unknown error'}. Check your key.`; }
    const d = await r.json();
    return d.content?.map(b=>b.text||'').join('\n') || 'No response.';
  } catch(e) { return 'Network error: '+e.message; }
}

// ─── DOM HELPERS ───
function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==='class') el.className=v;
    else if (k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  kids.flat(9).forEach(c => { if(c!=null) el.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return el;
}

function renderMd(text) {
  const d = h('div',{class:'md'});
  if(!text) return d;
  text.split('\n').forEach(l => {
    if(l.startsWith('### ')) d.appendChild(h('h4',null,l.slice(4)));
    else if(l.startsWith('## ')) d.appendChild(h('h3',null,l.slice(3)));
    else if(l.startsWith('# ')) d.appendChild(h('h2',null,l.slice(2)));
    else if(l.startsWith('- ')||l.startsWith('* ')){const x=h('div',{class:'li'});x.textContent=l.slice(2);d.appendChild(x)}
    else if(l.match(/^\d+\./)){const x=h('div',{class:'li'});x.textContent=l;d.appendChild(x)}
    else if(!l.trim()) d.appendChild(h('div',{style:{height:'8px'}}));
    else{const p=h('p');p.textContent=l;d.appendChild(p)}
  });
  return d;
}

// ─── STATE ───
let tab='dash', sel=null, aiC='', aiL=false;
let savedR = ls.get('research')||[];
let savedI = ls.get('ideas')||[];

// ─── RENDER ───
function render() {
  document.getElementById('date-line').textContent = fmtDate();
  // Nav
  const nav = document.getElementById('nav');
  nav.innerHTML='';
  [{id:'dash',l:'Dashboard',ic:'✦'},{id:'research',l:'Research',ic:'◈'},{id:'ideas',l:'Ideas',ic:'◎'}].forEach(t=>{
    nav.appendChild(h('button',{class:t.id===tab?'on':'',onClick:()=>{tab=t.id;sel=null;aiC='';render()}},
      h('span',{class:'ic'},t.ic),' '+t.l));
  });
  // Header tap to reconfigure key
  document.querySelector('header h1').onclick = () => { if(confirm('Reconfigure API key?')) showSetup(); };
  // Content
  const app=document.getElementById('app');
  app.innerHTML='';
  if(tab==='dash') app.appendChild(renderDash());
  else if(tab==='research') app.appendChild(renderResearch());
  else app.appendChild(renderIdeas());
}

// ─── DASHBOARD ───
function renderDash(){
  const f=document.createDocumentFragment();
  const sorted=[...TRIPS].sort((a,b)=>new Date(a.start)-new Date(b.start));
  const nx=sorted[0], nd=daysUntil(nx.start);

  // Alert
  const al=h('div',{class:'card fade',style:{borderColor:'var(--ac)',borderLeftWidth:'4px',marginBottom:'20px',padding:'14px'}});
  const at=h('div',{class:'thd',style:{fontSize:'14px'}});
  at.innerHTML=`<strong style="color:var(--ac)">Sean</strong> — ${nx.dest} is <strong>${nd} days away</strong> (${nx.dates}).`;
  if(nx.todo.length) at.innerHTML+=` You need to: <em style="color:var(--tm)">${nx.todo[0].toLowerCase()}</em>.`;
  al.appendChild(at);
  f.appendChild(al);

  // Trips header
  f.appendChild(h('h2',{style:{fontFamily:'var(--fd)',fontSize:'20px',marginBottom:'4px'}},'Confirmed Trips'));
  f.appendChild(h('p',{style:{color:'var(--tm)',fontSize:'12px',marginBottom:'14px'}},sorted.length+' trips'));

  sorted.forEach(t=>{
    const d=daysUntil(t.start), u=urg(d);
    const c=h('div',{class:'card'+(sel===t.id?' sel':''),onClick:()=>{sel=sel===t.id?null:t.id;render()}});
    const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}});
    const info=h('div',{style:{flex:'1',minWidth:'0'}});
    const row=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}});
    row.appendChild(h('span',{class:'thd',style:{fontSize:'15px'}},t.dest));
    row.appendChild(h('span',{class:'badge b-'+u},d+'d'));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tm)'}},t.pub));
    info.appendChild(row);
    info.appendChild(h('div',{class:'tm'},t.dates));
    top.appendChild(info);
    top.appendChild(h('button',{class:'btn g',style:{fontSize:'10px',padding:'6px 10px',flexShrink:'0',minHeight:'32px'},onClick:e=>{e.stopPropagation();doTripResearch(t)}},'Research'));
    c.appendChild(top);

    if(sel===t.id){
      const det=h('div',{class:'fade',style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--br)'}});
      if(t.brief) det.appendChild(h('p',{style:{fontSize:'13px',marginBottom:'6px'}},'📋 '+t.brief));
      if(t.flights) det.appendChild(h('p',{style:{fontSize:'12px',color:'var(--tm)',marginBottom:'4px'}},'✈ '+t.flights));
      if(t.hotel) det.appendChild(h('p',{style:{fontSize:'12px',color:'var(--tm)',marginBottom:'4px'}},'🏨 '+t.hotel));
      if(t.todo.length){
        det.appendChild(h('div',{class:'shd',style:{margin:'8px 0 6px'}},'To Do'));
        t.todo.forEach(x=>det.appendChild(h('div',{class:'todo'},x)));
      }
      c.appendChild(det);
    }
    f.appendChild(c);
  });

  // Commissioned
  f.appendChild(h('div',{class:'shd',style:{marginTop:'26px'}},'Commissioned — Need to Plan'));
  COMMISSIONED.forEach(c=>{
    const cd=h('div',{class:'card'});
    const row=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap',marginBottom:'6px'}});
    row.appendChild(h('span',{class:'thd',style:{fontSize:'15px'}},c.dest));
    row.appendChild(h('span',{class:'badge b-comm'},'Commissioned'));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tm)'}},c.pub));
    cd.appendChild(row);
    cd.appendChild(h('p',{style:{fontSize:'13px',marginBottom:'3px'}},'📐 '+c.angle));
    cd.appendChild(h('p',{style:{fontSize:'13px',marginBottom:'3px'}},c.brief));
    cd.appendChild(h('p',{style:{fontSize:'12px',color:'var(--tm)',marginBottom:'8px'}},c.contact));
    c.todo.forEach(t=>cd.appendChild(h('div',{class:'todo'},t)));
    f.appendChild(cd);
  });

  // Embryonic
  f.appendChild(h('div',{class:'shd',style:{marginTop:'26px',color:'var(--tm)'}},'Pipeline — In Embryo'));
  EMBRYONIC.forEach(e=>{
    const cd=h('div',{class:'card',style:{padding:'14px'}});
    const row=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}});
    row.appendChild(h('span',{style:{fontFamily:'var(--fd)',fontSize:'14px'}},e.dest));
    row.appendChild(h('span',{class:'badge b-emb'},e.status));
    row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tm)'}},e.pub));
    cd.appendChild(row);
    cd.appendChild(h('p',{style:{fontSize:'12px',color:'var(--tm)',marginTop:'5px'}},e.note));
    f.appendChild(cd);
  });

  // AI box
  if(aiC||aiL){
    const box=h('div',{class:'aibox fade'});
    if(aiL) box.innerHTML='<span class="pd"></span> <em style="color:var(--tm)">Thinking…</em>';
    else box.appendChild(renderMd(aiC));
    f.appendChild(box);
  }
  return f;
}

async function doTripResearch(t){
  aiL=true;aiC='';render();
  aiC=await askAI(
    'Cultured travel research assistant for a professional travel journalist. Rich, specific info: hidden gems, literary/historical connections, restaurants, atmospheric hotels, practical tips. Specific names. Concise markdown.',
    `Research: ${t.dest}. Publication: ${t.pub}. Brief: ${t.brief||'general travel piece'}. What should I know, see, eat, write about?`
  );
  aiL=false;render();
}

// ─── RESEARCH ───
function renderResearch(){
  const f=document.createDocumentFragment();
  f.appendChild(h('h2',{style:{fontFamily:'var(--fd)',fontSize:'20px',marginBottom:'3px'}},'Destination Research'));
  f.appendChild(h('p',{style:{color:'var(--tm)',fontSize:'12px',marginBottom:'16px'}},'Deep dives for upcoming trips or new ideas'));

  const row=h('div',{style:{display:'flex',gap:'8px',marginBottom:'14px'}});
  const inp=h('input',{type:'text',placeholder:"e.g. 'Vipava Valley wine' or 'Rwanda gorilla trekking'",id:'ri',style:{flex:'1'}});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doFreeR()});
  row.appendChild(inp);
  row.appendChild(h('button',{class:'btn p',onClick:doFreeR},'Go'));
  f.appendChild(row);

  if(aiC||aiL){
    const box=h('div',{class:'aibox fade'});
    if(aiL) box.innerHTML='<span class="pd"></span> <em style="color:var(--tm)">Thinking…</em>';
    else box.appendChild(renderMd(aiC));
    f.appendChild(box);
    if(aiC&&!aiL){
      f.appendChild(h('div',{style:{marginTop:'10px'}},
        h('button',{class:'btn s',onClick:()=>{
          const q=document.getElementById('ri')?.value||'Research';
          savedR.unshift({id:Date.now(),query:q,result:aiC,created:new Date().toISOString()});
          ls.set('research',savedR);render();
        }},'Save')));
    }
  }

  if(savedR.length){
    f.appendChild(h('div',{class:'shd',style:{marginTop:'24px',color:'var(--tm)'}},'Saved'));
    savedR.forEach((item,idx)=>{
      const cd=h('div',{class:'card',style:{padding:'14px',cursor:'pointer'},onClick:()=>{item._o=!item._o;render()}});
      const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.appendChild(h('span',{style:{fontFamily:'var(--fd)',fontSize:'13px'}},item.query));
      const rt=h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}});
      rt.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tm)'}},new Date(item.created).toLocaleDateString()));
      rt.appendChild(h('button',{class:'btn g',style:{fontSize:'9px',padding:'3px 7px',color:'#c44',minHeight:'auto'},onClick:e=>{e.stopPropagation();savedR.splice(idx,1);ls.set('research',savedR);render()}},'✕'));
      row.appendChild(rt);
      cd.appendChild(row);
      if(item._o){const d=h('div',{class:'fade',style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid var(--br)'}});d.appendChild(renderMd(item.result));cd.appendChild(d)}
      f.appendChild(cd);
    });
  }
  return f;
}
async function doFreeR(){
  const q=document.getElementById('ri')?.value?.trim();
  if(!q)return;
  aiL=true;aiC='';render();
  // Restore input value after render
  setTimeout(()=>{const i=document.getElementById('ri');if(i)i.value=q},0);
  aiC=await askAI('Deeply knowledgeable travel research assistant for a professional travel journalist. Rich info: history, culture, literary connections, food, practical tips. Specific names. Markdown.',q);
  aiL=false;render();
  setTimeout(()=>{const i=document.getElementById('ri');if(i)i.value=q},0);
}

// ─── IDEAS ───
function renderIdeas(){
  const f=document.createDocumentFragment();
  const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px',flexWrap:'wrap',gap:'10px'}});
  const left=h('div');
  left.appendChild(h('h2',{style:{fontFamily:'var(--fd)',fontSize:'20px'}},'Trip Ideas'));
  left.appendChild(h('p',{style:{color:'var(--tm)',fontSize:'12px',marginTop:'2px'}},'Embryonic trips, wish list, new pitches'));
  top.appendChild(left);
  const btns=h('div',{style:{display:'flex',gap:'6px'}});
  btns.appendChild(h('button',{class:'btn s',onClick:doSuggest},'AI Suggest'));
  btns.appendChild(h('button',{class:'btn p',onClick:()=>{const fm=document.getElementById('idf');if(fm)fm.style.display=fm.style.display==='none'?'block':'none'}},'+ Add'));
  top.appendChild(btns);
  f.appendChild(top);

  // Form
  const form=h('div',{class:'card',id:'idf',style:{display:'none',marginBottom:'18px'}});
  const grid=h('div',{style:{display:'grid',gap:'10px'}});
  grid.appendChild(h('input',{type:'text',id:'id-dest',placeholder:'Destination'}));
  grid.appendChild(h('input',{type:'text',id:'id-pub',placeholder:'Publication target (optional)'}));
  const ta=document.createElement('textarea');ta.id='id-note';ta.placeholder='Notes — angle, contacts…';ta.rows=3;grid.appendChild(ta);
  grid.appendChild(h('button',{class:'btn p',onClick:()=>{
    const d=document.getElementById('id-dest').value.trim();if(!d)return;
    savedI.unshift({id:Date.now(),destination:d,publication:document.getElementById('id-pub').value,note:document.getElementById('id-note').value,created:new Date().toISOString()});
    ls.set('ideas',savedI);document.getElementById('idf').style.display='none';render();
  }},'Save Idea'));
  form.appendChild(grid);f.appendChild(form);

  // List
  savedI.forEach((idea,idx)=>{
    const cd=h('div',{class:'card',style:{padding:'14px'}});
    const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
    const info=h('div');
    info.appendChild(h('span',{style:{fontFamily:'var(--fd)',fontSize:'14px'}},idea.destination));
    if(idea.publication) info.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tm)',marginLeft:'8px'}},idea.publication));
    row.appendChild(info);
    row.appendChild(h('button',{class:'btn g',style:{fontSize:'9px',padding:'3px 7px',color:'#c44',minHeight:'auto'},onClick:()=>{savedI.splice(idx,1);ls.set('ideas',savedI);render()}},'✕'));
    cd.appendChild(row);
    if(idea.note) cd.appendChild(h('p',{style:{fontSize:'12px',color:'var(--tm)',marginTop:'5px'}},idea.note));
    f.appendChild(cd);
  });

  if(!savedI.length) f.appendChild(h('div',{style:{textAlign:'center',padding:'40px',color:'var(--tm)'}},h('p',null,'No ideas yet. Add one or try AI Suggest.')));

  if(aiC||aiL){
    const box=h('div',{class:'aibox fade'});
    if(aiL) box.innerHTML='<span class="pd"></span> <em style="color:var(--tm)">Thinking…</em>';
    else box.appendChild(renderMd(aiC));
    f.appendChild(box);
  }
  return f;
}
async function doSuggest(){
  aiL=true;aiC='';render();
  aiC=await askAI(
    `Brilliant travel ideas generator for a professional journalist (Spectator, Telegraph, Daily Mail). He favours hidden gems, literary/historical depth, great food, atmosphere. Recently done: Central Asia, Bulgaria, Cambodia, Taiwan, China, Naples, California, Iceland, Rwanda, Hokkaido, Saudi, Belfast, Aveyron, Madeira. Suggest 5 fresh, pitchable trip ideas. Each: destination, punchy headline, 2-sentence pitch.`,
    'Suggest 5 new trip ideas. Surprise me. Think like an editor.'
  );
  aiL=false;render();
}
